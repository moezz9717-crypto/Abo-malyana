<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f5132">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ابو مليانة">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f5132'/%3E%3Cg transform='translate(34,30) scale(4.6)' fill='none' stroke='%23fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='9' cy='21' r='1.6' fill='%23fff' stroke='none'/%3E%3Ccircle cx='20' cy='21' r='1.6' fill='%23fff' stroke='none'/%3E%3Cpath d='M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6'/%3E%3C/g%3E%3C/svg%3E">
<title>ابو مليانة</title>
<style>
  :root{
    --bg:#eef1f4; --surface:#ffffff; --ink:#0f1720; --muted:#6b7280;
    --line:#e5e7eb; --brand:#0f5132; --brand2:#16a34a;
    --red:#dc2626; --redbg:#fef2f2; --amber:#d97706; --amberbg:#fffbeb;
    --green:#15803d; --greenbg:#f0fdf4;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  [hidden]{display:none !important}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none}
  body{
    font-family:-apple-system,"SF Pro Text","Segoe UI",Tahoma,"Helvetica Neue",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  input,button,select,textarea{font-family:inherit;font-size:16px}
  button{cursor:pointer;border:none;background:none}

  /* ===== Header ===== */
  header{
    position:sticky;top:0;z-index:30;
    background:var(--brand); color:#fff;
    padding:calc(var(--safe-top) + 12px) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  header h1{font-size:19px;font-weight:800;margin:0;letter-spacing:-.2px}
  header .sub{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.72);margin-top:2px}
  header .hbtn{color:#fff;background:rgba(255,255,255,.14);width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:18px}

  /* ===== Layout ===== */
  main{padding:14px 14px calc(86px + var(--safe-bot));max-width:680px;margin:0 auto}
  .screen{animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* ===== Search ===== */
  .searchbar{display:flex;gap:8px;margin-bottom:12px}
  .searchbox{flex:1;position:relative}
  .searchbox input{
    width:100%;padding:13px 42px 13px 14px;border:1px solid var(--line);
    border-radius:14px;background:var(--surface);box-shadow:var(--shadow);outline:none;
  }
  .searchbox input:focus{border-color:var(--brand2)}
  .searchbox .ico{position:absolute;top:50%;transform:translateY(-50%);inset-inline-start:14px;color:var(--muted);font-size:17px}
  .scan-btn{width:48px;border-radius:14px;background:var(--brand);color:#fff;font-size:20px;box-shadow:var(--shadow);display:grid;place-items:center}

  /* ===== Summary cards ===== */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .card{background:var(--surface);border-radius:14px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);border-top:3px solid var(--line)}
  .card.expired{border-top-color:var(--red)}
  .card.soon{border-top-color:var(--amber)}
  .card.ok{border-top-color:var(--green)}
  .card .num{font-size:24px;font-weight:800;line-height:1}
  .card.expired .num{color:var(--red)} .card.soon .num{color:var(--amber)} .card.ok .num{color:var(--green)}
  .card .lbl{font-size:11.5px;color:var(--muted);margin-top:5px}

  /* ===== Section title ===== */
  .sec-title{display:flex;align-items:center;gap:8px;margin:16px 2px 8px;font-size:13px;font-weight:700;color:var(--muted)}
  .sec-title .dot{width:9px;height:9px;border-radius:50%}
  .sec-title .dot.red{background:var(--red)} .sec-title .dot.amber{background:var(--amber)} .sec-title .dot.green{background:var(--green)}

  /* ===== Product card ===== */
  .item{
    background:var(--surface);border-radius:14px;padding:12px 13px;margin-bottom:9px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    display:flex;align-items:center;gap:12px;border-inline-start:4px solid var(--line);
  }
  .item.s-expired{border-inline-start-color:var(--red)}
  .item.s-soon{border-inline-start-color:var(--amber)}
  .item.s-ok{border-inline-start-color:var(--green)}
  .item .body{flex:1;min-width:0}
  .item .name{font-weight:700;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .item .meta .bc{font-variant-numeric:tabular-nums;direction:ltr}
  .badge{font-size:11.5px;font-weight:800;padding:5px 9px;border-radius:999px;white-space:nowrap}
  .badge.expired{background:var(--redbg);color:var(--red)}
  .badge.soon{background:var(--amberbg);color:var(--amber)}
  .badge.ok{background:var(--greenbg);color:var(--green)}
  /* shelf-life bar */
  .life{height:5px;border-radius:999px;background:#eceff2;margin-top:9px;overflow:hidden}
  .life > i{display:block;height:100%;border-radius:999px}

  .qty-chip{background:#f1f5f9;color:#334155;font-weight:700;font-size:12px;padding:3px 8px;border-radius:8px}

  .empty{text-align:center;color:var(--muted);padding:48px 20px}
  .empty .big{font-size:46px;margin-bottom:8px}
  .empty .t{font-weight:700;color:var(--ink);margin-bottom:4px}

  /* ===== Bottom nav ===== */
  nav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(14px);
    border-top:1px solid var(--line);
    display:flex;padding:8px 8px calc(8px + var(--safe-bot));
    max-width:680px;margin:0 auto;
  }
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:600;padding:4px}
  nav button .ni{font-size:22px;line-height:1}
  nav button.active{color:var(--brand)}
  nav .fab{flex:0 0 auto;width:54px;height:54px;border-radius:18px;background:var(--brand);color:#fff;margin-top:-22px;box-shadow:0 8px 18px rgba(15,81,50,.4);font-size:28px;display:grid;place-items:center}

  /* ===== Sheet / Modal ===== */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(15,23,32,.45);display:flex;align-items:flex-end;justify-content:center;animation:ov .2s ease}
  @keyframes ov{from{opacity:0}to{opacity:1}}
  .sheet{
    background:var(--surface);width:100%;max-width:680px;
    border-radius:22px 22px 0 0;padding:8px 18px calc(20px + var(--safe-bot));
    max-height:92vh;overflow:auto;animation:up .26s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes up{from{transform:translateY(100%)}to{transform:none}}
  .grab{width:40px;height:5px;border-radius:999px;background:#d8dde3;margin:6px auto 10px}
  .sheet h2{font-size:18px;margin:2px 0 16px;font-weight:800}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13px;font-weight:700;color:#374151;margin-bottom:6px}
  .field input,.field select{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:#fbfcfd;outline:none}
  .field input:focus,.field select:focus{border-color:var(--brand2);background:#fff}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .bc-row{display:flex;gap:8px}
  .bc-row input{flex:1}
  .bc-row button{flex:0 0 auto;width:50px;border-radius:12px;background:var(--brand);color:#fff;font-size:20px}
  .hint{font-size:12px;color:var(--brand2);margin-top:5px;font-weight:600}
  .btn{display:block;width:100%;padding:15px;border-radius:14px;background:var(--brand);color:#fff;font-weight:800;font-size:16px;margin-top:8px}
  .btn.ghost{background:#f1f5f9;color:var(--ink)}
  .btn.danger{background:var(--redbg);color:var(--red)}
  .menu-item{display:flex;align-items:center;gap:12px;padding:15px 4px;border-bottom:1px solid var(--line);font-weight:600}
  .menu-item .mi{font-size:20px;width:26px;text-align:center}
  .menu-item:last-child{border-bottom:none}

  /* image picker */
  .img-pick{position:relative;width:104px;height:104px;border-radius:14px;border:1px dashed #cbd5e1;background:#fbfcfd;display:grid;place-items:center;overflow:hidden}
  .img-pick img{width:100%;height:100%;object-fit:cover;display:block}
  .img-ph{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:12.5px;font-weight:600}
  .img-ph .e{font-size:26px}
  .img-del{position:absolute;top:5px;inset-inline-end:5px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:12px;display:grid;place-items:center}
  .thumb{width:48px;height:48px;border-radius:11px;object-fit:cover;flex:0 0 auto;background:#eceff2}

  /* scanner */
  #reader{width:100%;border-radius:14px;overflow:hidden;background:#000;min-height:240px}
  #reader video{border-radius:14px}

  /* toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(96px + var(--safe-bot));z-index:99;background:#0f1720;color:#fff;padding:11px 18px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:.25s;max-width:90%}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
</style>
</head>
<body>

<header>
  <div>
    <h1>🛒 ابو مليانة</h1>
    <div class="sub" id="subtitle">الصلاحيات</div>
  </div>
  <button class="hbtn" id="menuBtn" aria-label="القائمة">☰</button>
</header>

<main id="main"></main>

<nav>
  <button data-tab="expiry" class="active"><span class="ni">📅</span><span>الصلاحيات</span></button>
  <button class="fab" id="addBtn" aria-label="إضافة منتج">＋</button>
  <button data-tab="stock"><span class="ni">📋</span><span>المخزون</span></button>
</nav>

<div id="toast"></div>

<script>
/* ============ Storage ============ */
const DB_KEY='hyper_products_v1', SET_KEY='hyper_settings_v1';
let products = load(DB_KEY, []);
const DEFAULT_CATS=['بقالة','ألبان وأجبان','مشروبات','منظفات','عناية شخصية','معلبات','مخبوزات','مجمدات','حلويات','أخرى'];
let settings = load(SET_KEY, {warnDays:30,categories:DEFAULT_CATS.slice()});
if(!settings.categories||!settings.categories.length) settings.categories=DEFAULT_CATS.slice();
let tab='expiry', search='', editingId=null;

function load(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
function save(){
  try{
    localStorage.setItem(DB_KEY,JSON.stringify(products));
    localStorage.setItem(SET_KEY,JSON.stringify(settings));
  }catch(e){
    toast('المساحة امتلأت — قلّل الصور أو احذف منتجات قديمة');
  }
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ============ Helpers ============ */
function toEnDigits(s){
  return (s||'').toString()
    .replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d))
    .replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d))
    .replace(/[٫.]/g,'.').replace(/٬/g,'');
}
function bindDigits(el){
  if(!el) return;
  el.addEventListener('input',()=>{
    const p=el.selectionStart, v=toEnDigits(el.value);
    if(v!==el.value){el.value=v; try{el.setSelectionRange(p,p)}catch{}}
  });
}
function catOptions(sel){
  const cats = (sel && !settings.categories.includes(sel)) ? [sel,...settings.categories] : settings.categories;
  let o='<option value="">— بدون تصنيف —</option>';
  cats.forEach(c=>{o+=`<option value="${escapeAttr(c)}" ${c===sel?'selected':''}>${escapeHtml(c)}</option>`;});
  o+='<option value="__new__">➕ تصنيف جديد...</option>';
  return o;
}
function compressImage(file,max=480,q=0.7){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h){ if(w>max){h=Math.round(h*max/w);w=max;} }
        else { if(h>max){w=Math.round(w*max/h);h=max;} }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',q));
      };
      img.onerror=rej; img.src=r.result;
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}
function normalize(s){
  return (s||'').toString().toLowerCase()
    .replace(/[\u064B-\u0652\u0670]/g,'')      // تشكيل
    .replace(/[إأآا]/g,'ا').replace(/[ىئ]/g,'ي')
    .replace(/ؤ/g,'و').replace(/ة/g,'ه').replace(/گ/g,'ك')
    .replace(/\s+/g,' ').trim();
}
function todayStart(){const d=new Date();d.setHours(0,0,0,0);return d}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr+'T00:00:00');
  return Math.round((d - todayStart())/86400000);
}
function statusOf(p){
  const d=daysUntil(p.expiry);
  if(d===null) return 'ok';
  if(d<0) return 'expired';
  if(d<=settings.warnDays) return 'soon';
  return 'ok';
}
function fmtDate(s){
  if(!s) return '—';
  const d=new Date(s+'T00:00:00');
  return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short',year:'numeric'});
}
function daysLabel(p){
  const d=daysUntil(p.expiry);
  if(d===null) return {cls:'ok',txt:'بدون صلاحية'};
  if(d<0) return {cls:'expired',txt:`انتهت من ${Math.abs(d)} يوم`};
  if(d===0) return {cls:'expired',txt:'تنتهي النهاردة'};
  if(d<=settings.warnDays) return {cls:'soon',txt:`باقي ${d} يوم`};
  return {cls:'ok',txt:`باقي ${d} يوم`};
}
function lifeBar(p){
  const d=daysUntil(p.expiry);
  if(d===null) return '';
  const span=settings.warnDays*3; // مرجع لطول العمر
  let pct=Math.max(0,Math.min(100,(d/span)*100));
  let col= d<0?'var(--red)': d<=settings.warnDays?'var(--amber)':'var(--green)';
  if(d<0) pct=100;
  return `<div class="life"><i style="width:${pct}%;background:${d<0?'var(--red)':col}"></i></div>`;
}
function knownNameFor(bc){
  const hit=products.find(p=>p.barcode && p.barcode===bc);
  return hit?hit.name:'';
}

/* ============ Render ============ */
const main=document.getElementById('main');
const subEl=document.getElementById('subtitle');

function render(){
  if(tab==='expiry'){subEl.textContent='الصلاحيات'; renderExpiry();}
  else {subEl.textContent='المخزون'; renderStock();}
  document.querySelectorAll('nav [data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
}

function searchBarHTML(){
  return `<div class="searchbar">
    <div class="searchbox">
      <input id="q" type="search" inputmode="search" placeholder="ابحث بالاسم أو الباركود..." value="${escapeAttr(search)}">
      <span class="ico">🔍</span>
    </div>
    <button class="scan-btn" id="qScan" aria-label="مسح باركود">📷</button>
  </div>`;
}
function matches(p){
  if(!search) return true;
  const q=normalize(search);
  return normalize(p.name).includes(q) || (p.barcode||'').includes(search.trim()) || normalize(p.category).includes(q);
}

function itemHTML(p){
  const dl=daysLabel(p);
  const st=statusOf(p);
  return `<div class="item s-${st}" data-id="${p.id}">
    ${p.image?`<img class="thumb" src="${p.image}" alt="">`:''}
    <div class="body">
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="meta">
        ${p.barcode?`<span class="bc">🏷️ ${escapeHtml(p.barcode)}</span>`:''}
        ${p.category?`<span>${escapeHtml(p.category)}</span>`:''}
        ${(p.sale??p.price)?`<span>💵 ${escapeHtml(toEnDigits(p.sale??p.price))} ج</span>`:''}
        <span class="qty-chip">×${p.qty||0}</span>
        <span>📅 ${fmtDate(p.expiry)}</span>
      </div>
      ${lifeBar(p)}
    </div>
    <span class="badge ${dl.cls}">${dl.txt}</span>
  </div>`;
}

function renderExpiry(){
  const list=products.slice();
  const expired=list.filter(p=>statusOf(p)==='expired').sort((a,b)=>daysUntil(a.expiry)-daysUntil(b.expiry));
  const soon=list.filter(p=>statusOf(p)==='soon').sort((a,b)=>daysUntil(a.expiry)-daysUntil(b.expiry));
  const ok=list.filter(p=>statusOf(p)==='ok').sort((a,b)=>(daysUntil(a.expiry)??1e9)-(daysUntil(b.expiry)??1e9));

  let html = `<div class="screen">
    <div class="cards">
      <div class="card expired"><div class="num">${expired.length}</div><div class="lbl">منتهية</div></div>
      <div class="card soon"><div class="num">${soon.length}</div><div class="lbl">قربت تنتهي</div></div>
      <div class="card ok"><div class="num">${ok.length}</div><div class="lbl">سليمة</div></div>
    </div>`;

  if(!products.length){
    html += emptyHTML('لسه مفيش منتجات','اضغط زر ＋ عشان تضيف أول منتج');
  } else {
    if(expired.length){ html+=`<div class="sec-title"><span class="dot red"></span>منتهية الصلاحية</div>`+expired.map(itemHTML).join(''); }
    if(soon.length){ html+=`<div class="sec-title"><span class="dot amber"></span>قربت تنتهي (خلال ${settings.warnDays} يوم)</div>`+soon.map(itemHTML).join(''); }
    if(ok.length){ html+=`<div class="sec-title"><span class="dot green"></span>سليمة</div>`+ok.map(itemHTML).join(''); }
  }
  html+='</div>';
  main.innerHTML=html;
  bindItems();
}

function renderStock(){
  const list=products.filter(matches)
    .sort((a,b)=>(daysUntil(a.expiry)??1e9)-(daysUntil(b.expiry)??1e9));
  let html=`<div class="screen">${searchBarHTML()}`;
  if(!products.length){
    html+=emptyHTML('المخزن فاضي','اضغط ＋ عشان تضيف منتج');
  } else if(!list.length){
    html+=emptyHTML('مفيش نتائج','جرّب كلمة تانية أو امسح الباركود');
  } else {
    html+=`<div class="sec-title">إجمالي: ${list.length} صنف</div>`;
    html+=list.map(itemHTML).join('');
  }
  html+='</div>';
  main.innerHTML=html;

  const q=document.getElementById('q');
  if(q){
    q.addEventListener('input',e=>{
      const v=toEnDigits(e.target.value);
      if(v!==e.target.value){const p=e.target.selectionStart;e.target.value=v;try{e.target.setSelectionRange(p,p)}catch{}}
      search=v;
      renderStockSoft();
    });
  }
  document.getElementById('qScan')?.addEventListener('click',()=>openScanner(code=>{search=code;render();}));
  bindItems();
}
// إعادة رسم القائمة فقط من غير ما الـ input يفقد التركيز
function renderStockSoft(){
  const list=products.filter(matches).sort((a,b)=>(daysUntil(a.expiry)??1e9)-(daysUntil(b.expiry)??1e9));
  let html='';
  if(!list.length){ html=emptyHTML('مفيش نتائج','جرّب كلمة تانية أو امسح الباركود'); }
  else { html=`<div class="sec-title">إجمالي: ${list.length} صنف</div>`+list.map(itemHTML).join(''); }
  const wrap=main.querySelector('.screen');
  // نشيل كل حاجة بعد الـ searchbar ونحط الجديد
  const sb=wrap.querySelector('.searchbar');
  while(sb.nextSibling) sb.nextSibling.remove();
  sb.insertAdjacentHTML('afterend',html);
  bindItems();
}

function emptyHTML(t,s){return `<div class="empty"><div class="big">🛒</div><div class="t">${t}</div><div>${s}</div></div>`}
function bindItems(){
  main.querySelectorAll('.item').forEach(el=>el.addEventListener('click',()=>openForm(el.dataset.id)));
}

/* ============ Add / Edit form ============ */
function openForm(id){
  editingId=id||null;
  const p = id ? products.find(x=>x.id===id) : {name:'',barcode:'',category:'',qty:1,expiry:'',price:''};
  const sheet = makeSheet(`
    <h2>${id?'تعديل منتج':'إضافة منتج'}</h2>
    <div class="field">
      <label>صورة المنتج</label>
      <div class="img-pick" id="f_imgwrap">
        <img id="f_imgview" alt="" ${p.image?`src="${p.image}"`:'hidden'}>
        <div class="img-ph" id="f_imgph" ${p.image?'hidden':''}><span class="e">📷</span><span>أضف صورة</span></div>
        <button type="button" class="img-del" id="f_imgdel" ${p.image?'':'hidden'}>✕</button>
      </div>
      <input type="file" id="f_imgfile" accept="image/*" hidden>
    </div>
    <div class="field">
      <label>الباركود</label>
      <div class="bc-row">
        <input id="f_bc" inputmode="numeric" placeholder="امسح أو اكتب الباركود" value="${escapeAttr(p.barcode)}">
        <button id="f_scan">📷</button>
      </div>
      <div class="hint" id="bcHint" hidden></div>
    </div>
    <div class="field">
      <label>اسم المنتج *</label>
      <input id="f_name" placeholder="مثال: زيت عافية 1 لتر" value="${escapeAttr(p.name)}">
    </div>
    <div class="row2">
      <div class="field"><label>الكمية</label><input id="f_qty" inputmode="numeric" value="${p.qty??1}"></div>
      <div class="field"><label>التصنيف</label><select id="f_cat">${catOptions(p.category)}</select></div>
    </div>
    <div class="row2">
      <div class="field"><label>سعر الجملة</label><input id="f_wprice" inputmode="decimal" placeholder="اختياري" value="${escapeAttr(p.wholesale??'')}"></div>
      <div class="field"><label>سعر البيع</label><input id="f_sprice" inputmode="decimal" placeholder="اختياري" value="${escapeAttr(p.sale??p.price??'')}"></div>
    </div>
    <div class="field"><label>تاريخ الصلاحية</label><input id="f_exp" type="date" value="${p.expiry||''}"></div>
    <button class="btn" id="f_save">${id?'حفظ التعديل':'إضافة المنتج'}</button>
    ${id?'<button class="btn danger" id="f_del">🗑️ حذف المنتج</button>':''}
  `);

  const bcInput=sheet.querySelector('#f_bc');
  const nameInput=sheet.querySelector('#f_name');
  const hint=sheet.querySelector('#bcHint');
  function checkBarcode(){
    const known=knownNameFor(bcInput.value.trim());
    if(known && !id){
      hint.hidden=false; hint.textContent=`✓ منتج معروف: ${known}`;
      if(!nameInput.value) nameInput.value=known;
    } else hint.hidden=true;
  }
  bcInput.addEventListener('input',checkBarcode); checkBarcode();

  // تحويل الأرقام العربي لإنجليزي في الخانات الرقمية
  ['#f_bc','#f_qty','#f_wprice','#f_sprice'].forEach(s=>bindDigits(sheet.querySelector(s)));

  // التصنيفات المنسدلة + إضافة تصنيف جديد
  const catSel=sheet.querySelector('#f_cat');
  let lastCat=catSel.value;
  catSel.addEventListener('change',()=>{
    if(catSel.value==='__new__'){
      const name=(prompt('اسم التصنيف الجديد:')||'').trim();
      if(name){
        if(!settings.categories.includes(name)){settings.categories.push(name);save();}
        catSel.innerHTML=catOptions(name);
        toast('تمت إضافة التصنيف ✓');
      } else { catSel.value=lastCat; }
    }
    lastCat = catSel.value==='__new__' ? lastCat : catSel.value;
  });

  // صورة المنتج
  let imgData = p.image||'';
  const imgFile=sheet.querySelector('#f_imgfile');
  const imgView=sheet.querySelector('#f_imgview');
  const imgPh=sheet.querySelector('#f_imgph');
  const imgDel=sheet.querySelector('#f_imgdel');
  sheet.querySelector('#f_imgwrap').addEventListener('click',e=>{ if(e.target===imgDel)return; imgFile.click(); });
  imgFile.addEventListener('change',async()=>{
    const f=imgFile.files[0]; if(!f) return;
    try{
      imgData=await compressImage(f);
      imgView.src=imgData; imgView.hidden=false; imgPh.hidden=true; imgDel.hidden=false;
    }catch{ toast('تعذّر تحميل الصورة'); }
  });
  imgDel.addEventListener('click',e=>{ e.stopPropagation(); imgData=''; imgFile.value=''; imgView.removeAttribute('src'); imgView.hidden=true; imgPh.hidden=false; imgDel.hidden=true; });

  sheet.querySelector('#f_scan').addEventListener('click',()=>openScanner(code=>{bcInput.value=code;checkBarcode();}));
  sheet.querySelector('#f_save').addEventListener('click',()=>{
    const name=nameInput.value.trim();
    if(!name){toast('اكتب اسم المنتج');nameInput.focus();return;}
    let cat=sheet.querySelector('#f_cat').value; if(cat==='__new__')cat='';
    const data={
      name, barcode:toEnDigits(bcInput.value.trim()), category:cat,
      qty:parseInt(toEnDigits(sheet.querySelector('#f_qty').value))||0,
      expiry:sheet.querySelector('#f_exp').value||'',
      wholesale:toEnDigits(sheet.querySelector('#f_wprice').value.trim()),
      sale:toEnDigits(sheet.querySelector('#f_sprice').value.trim()),
      image:imgData
    };
    if(id){ Object.assign(products.find(x=>x.id===id),data,{updatedAt:Date.now()}); toast('تم الحفظ ✓'); }
    else { products.push({id:uid(),...data,addedAt:Date.now()}); toast('تمت الإضافة ✓'); }
    save(); closeSheet(); render();
  });
  if(id){
    sheet.querySelector('#f_del').addEventListener('click',()=>{
      if(confirm('متأكد إنك عايز تحذف المنتج؟')){
        products=products.filter(x=>x.id!==id); save(); closeSheet(); render(); toast('تم الحذف');
      }
    });
  }
}

/* ============ Menu ============ */
document.getElementById('menuBtn').addEventListener('click',()=>{
  const sheet=makeSheet(`
    <h2>الإعدادات والنسخ الاحتياطي</h2>
    <div class="field">
      <label>نبّهني قبل انتهاء الصلاحية بـ (أيام)</label>
      <input id="s_warn" inputmode="numeric" value="${settings.warnDays}">
    </div>
    <button class="btn" id="s_save">حفظ الإعدادات</button>
    <div class="menu-item" id="m_export"><span class="mi">⬇️</span> تنزيل نسخة احتياطية (JSON)</div>
    <div class="menu-item" id="m_import"><span class="mi">⬆️</span> استرجاع نسخة احتياطية</div>
    <div class="menu-item" style="color:var(--red)" id="m_clear"><span class="mi">🗑️</span> مسح كل البيانات</div>
    <input type="file" id="m_file" accept="application/json" hidden>
  `);
  sheet.querySelector('#s_save').addEventListener('click',()=>{
    settings.warnDays=Math.max(1,parseInt(sheet.querySelector('#s_warn').value)||30);
    save(); closeSheet(); render(); toast('تم حفظ الإعدادات ✓');
  });
  sheet.querySelector('#m_export').addEventListener('click',exportData);
  sheet.querySelector('#m_import').addEventListener('click',()=>sheet.querySelector('#m_file').click());
  sheet.querySelector('#m_file').addEventListener('change',importData);
  sheet.querySelector('#m_clear').addEventListener('click',()=>{
    if(confirm('هيتم مسح كل المنتجات نهائيًا. متأكد؟')){products=[];save();closeSheet();render();toast('تم المسح');}
  });
});

function exportData(){
  const blob=new Blob([JSON.stringify({products,settings},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='hyper-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('تم تنزيل النسخة ✓');
}
function importData(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(Array.isArray(d.products)){products=d.products; if(d.settings)settings=d.settings; save(); closeSheet(); render(); toast('تم الاسترجاع ✓');}
      else toast('الملف مش صحيح');
    }catch{toast('تعذّر قراءة الملف')}
  };
  r.readAsText(f);
}

/* ============ Scanner (html5-qrcode) ============ */
let scannerLib=null, html5Qr=null;
function openScanner(onResult){
  const sheet=makeSheet(`<h2>مسح الباركود</h2><div id="reader"></div><button class="btn ghost" id="sc_close" style="margin-top:14px">إغلاق</button>`,true);
  sheet.querySelector('#sc_close').addEventListener('click',closeSheet);
  const reader=sheet.querySelector('#reader');
  reader.innerHTML='<div style="color:#fff;text-align:center;padding:90px 10px">⏳ جاري تشغيل الكاميرا...</div>';

  loadScannerLib().then(()=>{
    reader.innerHTML='';
    html5Qr=new Html5Qrcode("reader");
    html5Qr.start({facingMode:"environment"},
      {fps:10,qrbox:{width:250,height:160}},
      (txt)=>{ stopScanner(); closeSheet(); onResult(txt); toast('تم المسح: '+txt); },
      ()=>{}
    ).catch(err=>{
      reader.innerHTML=`<div style="color:#fff;text-align:center;padding:50px 16px">تعذّر فتح الكاميرا.<br><small>${err}</small><br><br>تقدر تكتب الباركود يدوي.</div>`;
    });
  }).catch(()=>{
    reader.innerHTML='<div style="color:#fff;text-align:center;padding:60px 16px">مكتبة المسح مش متاحة (محتاج إنترنت أول مرة).<br>اكتب الباركود يدوي.</div>';
  });
}
function loadScannerLib(){
  if(window.Html5Qrcode) return Promise.resolve();
  if(scannerLib) return scannerLib;
  scannerLib=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
  return scannerLib;
}
function stopScanner(){ if(html5Qr){try{html5Qr.stop().then(()=>html5Qr.clear()).catch(()=>{})}catch{} html5Qr=null;} }

/* ============ Sheet system ============ */
function makeSheet(inner,onScan){
  closeSheet();
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ov';
  ov.innerHTML=`<div class="sheet"><div class="grab"></div>${inner}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeSheet();});
  document.body.appendChild(ov);
  return ov.querySelector('.sheet');
}
function closeSheet(){ stopScanner(); const ov=document.getElementById('ov'); if(ov)ov.remove(); }

/* ============ Nav ============ */
document.querySelectorAll('nav [data-tab]').forEach(b=>b.addEventListener('click',()=>{tab=b.dataset.tab;search='';render();}));
document.getElementById('addBtn').addEventListener('click',()=>openForm());

/* ============ Toast ============ */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ============ utils ============ */
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;')}

/* ============ PWA service worker (اختياري) ============ */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{}); // يشتغل لو رفعت ملف sw.js — التطبيق شغال من غيره عادي
}

render();
</script>
